<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход в систему | Шахматный движок</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow-x: hidden;
        }

        /* Шахматный фон */
        body::before {
            content: "";
            position: absolute;
            width: 100%;
            height: 100%;
            background-image:
                linear-gradient(45deg, rgba(255,255,255,0.1) 25%, transparent 25%),
                linear-gradient(-45deg, rgba(255,255,255,0.1) 25%, transparent 25%);
            background-size: 60px 60px;
            pointer-events: none;
        }

        /* Анимированные шахматные фигуры на фоне */
        .chess-piece {
            position: absolute;
            font-size: 2rem;
            opacity: 0.1;
            animation: float 20s infinite linear;
            pointer-events: none;
        }

        @keyframes float {
            0% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 0.1;
            }
            90% {
                opacity: 0.1;
            }
            100% {
                transform: translateY(-100vh) rotate(360deg);
                opacity: 0;
            }
        }

        .container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 450px;
            padding: 20px;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 25px 70px rgba(0, 0, 0, 0.4);
        }

        .header {
            text-align: center;
            margin-bottom: 35px;
        }

        .chess-icon {
            font-size: 3.5rem;
            margin-bottom: 15px;
            display: inline-block;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-5px);
            }
        }

        h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .subtitle {
            color: #666;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
            font-size: 14px;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-icon {
            position: absolute;
            left: 15px;
            color: #999;
            font-size: 18px;
        }

        input {
            width: 100%;
            padding: 12px 15px 12px 45px;
            border: 2px solid #e1e5e9;
            border-radius: 12px;
            font-size: 16px;
            transition: all 0.3s ease;
            background: white;
            font-family: inherit;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        input:hover {
            border-color: #764ba2;
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .login-btn.loading {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .login-btn.loading::after {
            content: "";
            position: absolute;
            width: 20px;
            height: 20px;
            top: 50%;
            left: 50%;
            margin-left: -10px;
            margin-top: -10px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .message {
            margin-top: 20px;
            padding: 12px;
            border-radius: 10px;
            text-align: center;
            font-size: 14px;
            display: none;
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.error {
            background: #fee;
            color: #c33;
            border-left: 4px solid #c33;
            display: block;
        }

        .message.success {
            background: #efe;
            color: #3c3;
            border-left: 4px solid #3c3;
            display: block;
        }

        .register-link {
            text-align: center;
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid #e1e5e9;
        }

        .register-link p {
            color: #666;
            font-size: 14px;
        }

        .register-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s ease;
        }

        .register-link a:hover {
            color: #764ba2;
            text-decoration: underline;
        }

        /* Адаптивность */
        @media (max-width: 480px) {
            .login-card {
                padding: 30px 20px;
            }

            h1 {
                font-size: 24px;
            }

            .chess-icon {
                font-size: 2.5rem;
            }
        }
    </style>
</head>
<body>
    <!-- Анимированные шахматные фигуры -->
    <div class="chess-piece" style="left: 5%; animation-duration: 25s;">♔</div>
    <div class="chess-piece" style="left: 15%; animation-duration: 30s; animation-delay: -5s;">♕</div>
    <div class="chess-piece" style="left: 85%; animation-duration: 22s;">♖</div>
    <div class="chess-piece" style="left: 75%; animation-duration: 28s; animation-delay: -10s;">♗</div>
    <div class="chess-piece" style="left: 95%; animation-duration: 35s;">♘</div>
    <div class="chess-piece" style="left: 45%; animation-duration: 27s; animation-delay: -3s;">♙</div>
    <div class="chess-piece" style="left: 25%; animation-duration: 32s;">♚</div>
    <div class="chess-piece" style="left: 65%; animation-duration: 24s; animation-delay: -8s;">♛</div>

    <div class="container">
        <div class="login-card">
            <div class="header">
                <div class="chess-icon">♜</div>
                <h1>Добро пожаловать</h1>
                <p class="subtitle">Войдите в шахматный движок</p>
            </div>

            <form id="loginForm" onsubmit="return false;">
                <div class="form-group">
                    <label for="login">Логин</label>
                    <div class="input-wrapper">
                        <span class="input-icon">👤</span>
                        <input
                            type="text"
                            id="login"
                            name="login"
                            placeholder="Введите ваш логин"
                            autocomplete="username"
                            required
                        >
                    </div>
                </div>

                <div class="form-group">
                    <label for="password">Пароль</label>
                    <div class="input-wrapper">
                        <span class="input-icon">🔒</span>
                        <input
                            type="password"
                            id="password"
                            name="password"
                            placeholder="Введите пароль"
                            autocomplete="current-password"
                            required
                        >
                    </div>
                </div>

                <button
                    class="login-btn"
                    onclick="sendLogin()"
                    type="button"
                    id="loginBtn"
                >
                    Войти в систему
                </button>

                <div id="message" class="message"></div>
            </form>

            <div class="register-link">
                <p>Нет аккаунта? <a href="/register">Зарегистрироваться</a></p>
            </div>
        </div>
    </div>

    <script>
        function sendLogin() {
            const login = document.getElementById("login").value.trim();
            const password = document.getElementById("password").value;
            const messageDiv = document.getElementById("message");
            const loginBtn = document.getElementById("loginBtn");

            // Очищаем предыдущее сообщение
            messageDiv.className = "message";
            messageDiv.style.display = "none";
            messageDiv.textContent = "";

            // Валидация полей
            if (!login) {
                showMessage("Пожалуйста, введите логин", "error");
                document.getElementById("login").focus();
                return;
            }

            if (!password) {
                showMessage("Пожалуйста, введите пароль", "error");
                document.getElementById("password").focus();
                return;
            }

            // Показываем состояние загрузки
            loginBtn.classList.add("loading");
            loginBtn.textContent = "Вход...";

            // Отправляем запрос на сервер
            fetch("/input", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ login, password })
            })
            .then(async response => {
                // Пытаемся получить данные ответа
                let data;
                try {
                    data = await response.json();
                } catch (e) {
                    data = { error: "Ошибка сервера" };
                }

                if (response.status === 201) {
                    // Успешный вход
                    showMessage("Вход выполнен успешно! Перенаправление...", "success");

                    // Небольшая задержка для показа сообщения
                    setTimeout(() => {
                        window.location.href = '/game';
                    }, 500);
                } else {
                    // Ошибка входа
                    const errorMessage = data.error || "Неверный логин или пароль";
                    showMessage(errorMessage, "error");

                    // Очищаем поле пароля при ошибке
                    document.getElementById("password").value = "";
                    document.getElementById("password").focus();

                    // Возвращаем кнопку в исходное состояние
                    loginBtn.classList.remove("loading");
                    loginBtn.textContent = "Войти в систему";
                }
            })
            .catch(error => {
                console.error("Ошибка:", error);
                showMessage("Ошибка соединения с сервером. Попробуйте позже.", "error");

                // Возвращаем кнопку в исходное состояние
                loginBtn.classList.remove("loading");
                loginBtn.textContent = "Войти в систему";
            });
        }

        function showMessage(text, type) {
            const messageDiv = document.getElementById("message");
            messageDiv.textContent = text;
            messageDiv.className = `message ${type}`;
            messageDiv.style.display = "block";

            // Автоматически скрываем сообщение через 5 секунд (кроме успешного входа)
            if (type !== "success") {
                setTimeout(() => {
                    if (messageDiv.className.includes(type)) {
                        messageDiv.style.display = "none";
                    }
                }, 5000);
            }
        }

        // Добавляем возможность отправки формы по нажатию Enter
        document.addEventListener("DOMContentLoaded", function() {
            const inputs = document.querySelectorAll("input");
            inputs.forEach(input => {
                input.addEventListener("keypress", function(event) {
                    if (event.key === "Enter") {
                        event.preventDefault();
                        sendLogin();
                    }
                });
            });

            // Фокус на поле логина при загрузке
            document.getElementById("login").focus();
        });
    </script>
</body>
</html>
