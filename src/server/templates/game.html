<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Шахматы против AI</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .game-container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 32px;
            padding: 25px;
            box-shadow: 0 30px 50px rgba(0, 0, 0, 0.4);
            max-width: 800px;
            width: 100%;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.95);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .game-header {
            text-align: center;
            margin-bottom: 25px;
        }

        .game-header h1 {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-size: 2rem;
            margin-bottom: 8px;
        }

        .game-status {
            color: #666;
            font-size: 1rem;
            padding: 8px;
            background: #f0f0f0;
            border-radius: 20px;
            display: inline-block;
            margin-top: 5px;
        }

        .chessboard-wrapper {
            display: flex;
            justify-content: center;
            margin-bottom: 25px;
        }

        .chessboard {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            width: 100%;
            max-width: 560px;
            aspect-ratio: 1 / 1;
            background: #b58863;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 20px 35px rgba(0, 0, 0, 0.3);
            border: 3px solid #d4af7a;
        }

        .square {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            transition: all 0.1s ease;
            position: relative;
            cursor: pointer;
        }

        .square-light {
            background-color: #f0d9b5;
        }

        .square-dark {
            background-color: #b58863;
        }

        /* ---------- Стили для подсветки ходов ---------- */
        .square.selected {
            background-color: #7fc97f !important;
            box-shadow: inset 0 0 0 3px #2b6e2b;
        }

        .square.highlight-move {
            background-color: #b8d9b0 !important;
            box-shadow: inset 0 0 0 3px #3a7c3a;
        }

        .square.highlight-capture {
            background-color: #e8a0a0 !important;
            box-shadow: inset 0 0 0 3px #a13d3d;
        }

        .square.highlight-move::after {
            content: '';
            position: absolute;
            width: 30%;
            height: 30%;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.15);
            pointer-events: none;
        }

        .square.highlight-capture::after {
            content: '';
            position: absolute;
            width: 80%;
            height: 80%;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.1);
            border: 4px solid rgba(0, 0, 0, 0.2);
            pointer-events: none;
        }

        /* ---------- Остальные стили ---------- */
        .game-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            margin-top: 20px;
            padding: 15px 20px;
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            border-radius: 20px;
        }

        .turn-indicator {
            font-size: 1.2rem;
            font-weight: bold;
            padding: 8px 20px;
            border-radius: 40px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .color-badge {
            padding: 8px 20px;
            border-radius: 40px;
            background: white;
            font-weight: 600;
            color: #333;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .btn-back {
            padding: 10px 24px;
            border: none;
            border-radius: 40px;
            background: #667eea;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-back:hover {
            background: #5a67d8;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .fen-info {
            margin-top: 15px;
            padding: 10px;
            background: rgba(0,0,0,0.05);
            border-radius: 15px;
            font-size: 0.8rem;
            text-align: center;
            word-break: break-all;
        }

        .moves-info {
            margin-top: 10px;
            padding: 10px;
            background: rgba(0,0,0,0.03);
            border-radius: 15px;
            font-size: 0.8rem;
            text-align: center;
            color: #555;
        }

        @media (max-width: 600px) {
            .square {
                font-size: 1.5rem;
            }

            .game-header h1 {
                font-size: 1.5rem;
            }

            .turn-indicator {
                font-size: 0.9rem;
                padding: 5px 12px;
            }

            .color-badge {
                font-size: 0.9rem;
                padding: 5px 12px;
            }

            .btn-back {
                padding: 6px 16px;
                font-size: 0.9rem;
            }
        }

        @keyframes pieceMove {
            0% {
                transform: scale(0.8);
                opacity: 0;
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        .square {
            animation: pieceMove 0.2s ease;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="game-header">
            <h1>⚔️ Шахматы против AI ⚔️</h1>
            <div class="game-status" id="gameStatus">🤖 Ожидание хода</div>
        </div>

        <div class="chessboard-wrapper">
            <div class="chessboard" id="chessboard"></div>
        </div>

        <div class="game-info">
            <div class="turn-indicator" id="turnIndicator">
                <span>🎲</span>
                <span id="turnText">Ожидание</span>
            </div>
            <div class="color-badge" id="playerColorBadge">
                🎨 Вы играете: —
            </div>
            <button class="btn-back" id="backToMenuBtn">
                🏠 Главное меню
            </button>
        </div>

        <div class="fen-info" id="fenInfo">
            <strong>FEN:</strong> <span id="fenValue">Загрузка...</span>
        </div>
        <div class="moves-info" id="movesInfo">
            <strong>Доступно ходов:</strong> <span id="movesCount">0</span>
        </div>
    </div>

    <script>
        // ----- Соответствие символов FEN фигурам -----
        const fenToPiece = {
            'r': '♜', 'n': '♞', 'b': '♝', 'q': '♛', 'k': '♚', 'p': '♟',
            'R': '♖', 'N': '♘', 'B': '♗', 'Q': '♕', 'K': '♔', 'P': '♙'
        };

        // ----- Получение данных из Flask -----
        // Ожидаемый формат all_possible_moves:
        // {
        //   "row,col": ["row,col", "row,col", ...],
        //   "row,col": ["row,col", ...],
        //   ...
        // }
        let currentFen = '{{ fen }}';
        let allPossibleMoves = {{ all_possible_moves | tojson | safe }};

        // Если FEN пустой или содержит {{ fen }}, используем начальную позицию
        if (!currentFen) {
            currentFen = 'rnbqkbnr/pppppppp/8/8/8/8/PPPPPPPP/RNBQKBNR w KQkq - 0 1';
        }

        // Если allPossibleMoves пустой или невалидный, создаём пустой объект
        if (!allPossibleMoves || typeof allPossibleMoves !== 'object') {
            allPossibleMoves = {};
        }

        // Получаем выбранный цвет из localStorage
        const storedColor = localStorage.getItem('playerColor');
        let playerColor = 'white';
        if (storedColor === 'white' || storedColor === 'black') {
            playerColor = storedColor;
        }

        // Обновляем отображение цвета игрока
        document.getElementById('playerColorBadge').innerHTML = `🎨 Вы играете: ${playerColor === 'white' ? 'Белыми ♔' : 'Чёрными ♚'}`;

        // Отображаем FEN
        document.getElementById('fenValue').textContent = currentFen;

        // ----- Парсинг FEN -----
        function parseFEN(fen) {
            const board = Array(8).fill().map(() => Array(8).fill(''));
            const positionPart = fen.split(' ')[0];
            const rows = positionPart.split('/');

            for (let i = 0; i < 8; i++) {
                let col = 0;
                const row = rows[i] || '';

                for (let j = 0; j < row.length; j++) {
                    const char = row[j];
                    if (isNaN(parseInt(char))) {
                        board[i][col] = fenToPiece[char] || '';
                        col++;
                    } else {
                        const skip = parseInt(char);
                        for (let k = 0; k < skip; k++) {
                            board[i][col] = '';
                            col++;
                        }
                    }
                }
            }
            return board;
        }

        function getTurnFromFEN(fen) {
            const parts = fen.split(' ');
            return (parts.length >= 2 && parts[1] === 'w') ? 'white' : 'black';
        }

        // ----- Глобальное состояние -----
        let board = parseFEN(currentFen);
        let currentTurn = getTurnFromFEN(currentFen);
        let selectedSquare = null;  // { row, col }
        let highlightedMoves = [];  // [{ row, col }]

        // Подсчёт общего количества ходов
        let totalMoves = 0;
        for (const key in allPossibleMoves) {
            if (allPossibleMoves.hasOwnProperty(key)) {
                totalMoves += allPossibleMoves[key].length;
            }
        }
        document.getElementById('movesCount').textContent = totalMoves;

        // ----- Отрисовка доски -----
        function renderBoard() {
            const boardElement = document.getElementById('chessboard');
            boardElement.innerHTML = '';

            const shouldRotate = (playerColor === 'black');

            for (let row = 0; row < 8; row++) {
                for (let col = 0; col < 8; col++) {
                    const square = document.createElement('div');

                    let displayRow = shouldRotate ? 7 - row : row;
                    let displayCol = shouldRotate ? 7 - col : col;

                    const isLight = (displayRow + displayCol) % 2 === 0;
                    let className = `square ${isLight ? 'square-light' : 'square-dark'}`;

                    // Проверяем, является ли клетка выбранной
                    if (selectedSquare && selectedSquare.row === displayRow && selectedSquare.col === displayCol) {
                        className += ' selected';
                    }

                    // Проверяем, есть ли ход на эту клетку
                    const isHighlighted = highlightedMoves.some(m => m.row === displayRow && m.col === displayCol);
                    if (isHighlighted) {
                        const hasPiece = board[displayRow][displayCol] !== '';
                        className += hasPiece ? ' highlight-capture' : ' highlight-move';
                    }

                    square.className = className;
                    square.textContent = board[displayRow][displayCol];

                    square.setAttribute('data-row', displayRow);
                    square.setAttribute('data-col', displayCol);

                    square.addEventListener('click', () => handleSquareClick(displayRow, displayCol));

                    boardElement.appendChild(square);
                }
            }
        }

        // ----- Обработка клика по клетке -----
        function handleSquareClick(row, col) {
            const piece = board[row][col];
            const isPlayerTurn = (playerColor === currentTurn);

            // Если кликнули на уже выбранную клетку - снимаем выделение
            if (selectedSquare && selectedSquare.row === row && selectedSquare.col === col) {
                clearSelection();
                renderBoard();
                return;
            }

            // Если кликнули на клетку с возможным ходом - выполняем ход
            if (selectedSquare) {
                const isMoveTarget = highlightedMoves.some(m => m.row === row && m.col === col);
                if (isMoveTarget) {
                    performMove(selectedSquare.row, selectedSquare.col, row, col);
                    return;
                }
            }

            // Если кликнули на свою фигуру - показываем её ходы
            if (piece && isPlayerTurn) {
                const isWhitePiece = piece.charCodeAt(0) >= 0x2654 && piece.charCodeAt(0) <= 0x2659;
                const isPlayerWhite = (playerColor === 'white');
                const isCorrectColor = (isWhitePiece && isPlayerWhite) || (!isWhitePiece && !isPlayerWhite);

                if (isCorrectColor) {
                    showMovesForPiece(row, col);
                    return;
                }
            }

            // Иначе снимаем выделение
            clearSelection();
            renderBoard();
        }

        // ----- Показ ходов для фигуры -----
        function showMovesForPiece(row, col) {
            clearSelection();
            selectedSquare = { row, col };

            // Формируем ключ для поиска в словаре
            const key = `${row},${col}`;

            // Проверяем, есть ли ходы для этой фигуры
            if (allPossibleMoves && allPossibleMoves[key]) {
                const moves = allPossibleMoves[key];

                // Преобразуем строки "row,col" в объекты { row, col }
                highlightedMoves = moves.map(moveStr => {
                    const [r, c] = moveStr.split(',').map(Number);
                    return { row: r, col: c };
                });
            }

            renderBoard();

            const colLetter = String.fromCharCode(97 + col);
            const rowNumber = 8 - row;
            const movesCount = highlightedMoves.length;

            if (movesCount > 0) {
                document.getElementById('gameStatus').textContent = `🎯 Выбрана клетка ${colLetter}${rowNumber} - ${movesCount} возможных ходов`;
            } else {
                document.getElementById('gameStatus').textContent = `⛔ Для фигуры на ${colLetter}${rowNumber} нет ходов`;
            }
        }

        // ----- Очистка выделения -----
        function clearSelection() {
            selectedSquare = null;
            highlightedMoves = [];
        }

        // ----- Выполнение хода (упрощённо) -----
        function performMove(fromRow, fromCol, toRow, toCol) {
            // Перемещаем фигуру
            board[toRow][toCol] = board[fromRow][fromCol];
            board[fromRow][fromCol] = '';

            // Меняем сторону
            currentTurn = (currentTurn === 'white') ? 'black' : 'white';

            // Очищаем выделение
            clearSelection();

            // Обновляем доску
            renderBoard();
            updateTurnInfo();

            document.getElementById('gameStatus').textContent = '✅ Ход выполнен';
        }

        // ----- Обновление информации о ходе -----
        function updateTurnInfo() {
            const turnText = document.getElementById('turnText');

            if (currentTurn === 'white') {
                turnText.textContent = 'Ход белых';
                turnIndicator.classList.remove('ai-turn');
            } else {
                turnText.textContent = 'Ход чёрных';
                turnIndicator.classList.add('ai-turn');
            }
        }

        // ----- Функция для обновления доски по новому FEN (для будущей интеграции) -----
        function updateBoardFromFEN(newFen) {
            currentFen = newFen;
            board = parseFEN(currentFen);
            currentTurn = getTurnFromFEN(currentFen);
            document.getElementById('fenValue').textContent = currentFen;
            clearSelection();
            renderBoard();
            updateTurnInfo();
        }

        // ----- Возврат в меню -----
        document.getElementById('backToMenuBtn').addEventListener('click', () => {
            window.location.href = '/';
        });

        // ----- Инициализация -----
        function init() {
            renderBoard();
            updateTurnInfo();

            if (totalMoves > 0) {
                document.getElementById('gameStatus').textContent = `🎯 Доступно ${totalMoves} ходов`;
            } else {
                document.getElementById('gameStatus').textContent = 'ℹ️ Нет доступных ходов';
            }
        }

        // Запуск
        init();
    </script>
</body>
</html>
